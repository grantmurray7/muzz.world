<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Login</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
            width: 300px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; font-weight: 400; font-size: 20px; text-align: center; }
        input[type="password"] {
            width: 100%;
            padding: 8px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        input[type="password"]:focus {
            border-color: #58a6ff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 8px;
            background-color: #238636;
            color: #ffffff;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background-color: #2ea043; }
        .error { color: #f85149; font-size: 13px; margin-bottom: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Master Terminal</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter ADMIN_PASSWORD" required autofocus>
            <button type="submit">Unlock System</button>
        </form>
    </div>
</body>
</html>
