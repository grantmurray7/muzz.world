<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>muzz.world - login</title>
    <style>
        @font-face {
            font-family: 'Colleged';
            src: url("{{ url_for('static', filename='fonts/Colleged.ttf') }}") format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        :root {
            --accent-pink: rgb(237, 125, 175);
            --page: #0b0d14;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #121521 0%, var(--page) 52%, #090b10 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 18px;
        }
        .login-card {
            width: min(520px, calc(100vw - 24px));
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
        }
        .login-logo {
            display: block;
            width: min(72%, 360px);
            height: auto;
            margin: 0 auto 30px;
        }
        .password-wrap {
            margin: 0 auto 14px;
            width: min(100%, 280px);
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 12px;
            background-color: #eef3ff;
            border: 0;
            border-radius: 10px;
            color: #0c0f16;
            font-size: 14px;
            letter-spacing: 0;
            outline: none;
            box-shadow: inset 0 0 0 1px rgba(10, 14, 24, 0.08);
        }
        input[type="password"]::placeholder { color: #7a8297; text-align: center}
        
        input[type="password"]:focus { box-shadow: inset 0 0 0 2px var(--accent-pink); }
        .cta {
            width: min(100%, 280px);
            margin: 0 auto;
        }
        button {
            position: relative;
            width: 100%;
            min-height: 132px;
            border: 0;
            border-radius: 10px;
            background: var(--accent-pink);
            color: #ffffff;
            cursor: pointer;
            overflow: hidden;
            padding: 18px 122px 18px 24px;
            text-align: left;
            box-shadow: 0 14px 26px rgba(0, 0, 0, 0.22);
        }
        button:hover { filter: brightness(1.04); }
        .cta-text {
            position: relative;
            z-index: 2;
            display: block;
            font-family: 'Colleged', sans-serif;
            font-size: clamp(22px, 4.3vw, 34px);
            line-height: 0.98;
            letter-spacing: 0;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.96);
            text-shadow:
                0 0 10px rgba(0, 0, 0, 0.28),
                0 0 18px rgba(0, 0, 0, 0.18),
                0 2px 0 rgba(255,255,255,0.08);
            transform: translateX(8px);
        }
        .cta-text span { display: block; }
        .cta-text span + span { margin-top: 0.46em; }
        .cta-figure {
            position: absolute;
            right: 18px;
            bottom: -1px;
            z-index: 1;
            width: min(36%, 158px);
            height: auto;
            pointer-events: none;
            user-select: none;
            filter: brightness(1.15) contrast(1.02);
            transform: translateX(-8px);
        }
        .error {
            color: #f85149;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }
        @media (max-width: 700px) {
            .login-logo { width: 82%; margin-bottom: 24px; }
            .password-wrap, .cta { width: min(100%, 280px); }
            button {
                min-height: 120px;
                padding: 16px 106px 16px 18px;
            }
            .cta-text { transform: translateX(6px); }
            .cta-figure { width: min(38%, 138px); right: 14px; bottom: -1px; transform: translateX(-8px); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img class="login-logo" src="{{ url_for('static', filename='logo.png') }}" alt="muzz.world">
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="password-wrap">
                <input type="password" name="password" placeholder="not your mama's 2007 facebook password" required autofocus>
            </div>
            <div class="cta">
                <button type="submit">
                    <span class="cta-text"><span>LET'S</span><span>FUCK</span></span>
                    <img class="cta-figure" src="{{ url_for('static', filename='hanna.png') }}" alt="figure">
                </button>
            </div>
        </form>
    </div>
</body>
</html>
