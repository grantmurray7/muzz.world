<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_label }} Trades</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #10151d; color: #f3f4f6; }
        .panel { background: #18202a; border: 1px solid #2b3948; border-radius: 0.75rem; }
        .label { color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
        table { width: 100%; }
        th, td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #253243; text-align: left; }
        th { color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .btn { background: #334155; color: white; border-radius: 0.6rem; padding: 0.7rem 1rem; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <div class="max-w-7xl mx-auto space-y-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
                <h1 class="text-3xl font-black tracking-tight">{{ page_label }} Trade Log</h1>
                <p class="text-sm text-gray-400 mono">Completed round-trip trades with fees and net PnL</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="{{ dashboard_href }}" class="btn">Dashboard</a>
                <a href="{{ results_href }}" class="btn">Results</a>
            </div>
        </div>

        <div class="panel p-4 overflow-x-auto">
            <table class="mono text-sm">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Timestamp</th>
                        <th>Coin</th>
                        <th>Exit Reason</th>
                        <th>Maker/Taker</th>
                        <th>Size</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Fees</th>
                        <th>Net PnL</th>
                        <th>Balance After</th>
                    </tr>
                </thead>
                <tbody id="tradeRows">
                    <tr><td colspan="11" class="text-gray-400">Loading trades...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const apiBase = '{{ api_base }}';
        function fmt(value, digits = 4) {
            return Number(value || 0).toFixed(digits);
        }

        async function loadTrades() {
            const res = await fetch(`${apiBase}/trades`);
            const data = await res.json();
            const rows = document.getElementById('tradeRows');
            rows.innerHTML = '';
            if (!data.trades || data.trades.length === 0) {
                rows.innerHTML = '<tr><td colspan="11" class="text-gray-400">No completed trades yet.</td></tr>';
                return;
            }
            data.trades.forEach((trade) => {
                const row = document.createElement('tr');
                const pnl = Number(trade.net_pnl || 0);
                const color = pnl >= 0 ? 'style="color:#4ade80"' : 'style="color:#f87171"';
                row.innerHTML = `
                    <td>${trade.id || ''}</td>
                    <td>${trade.timestamp || ''}</td>
                    <td>${trade.coin || 'N/A'}</td>
                    <td>${trade.exit_reason || ''}</td>
                    <td>${trade.maker_or_taker || ''}</td>
                    <td>${fmt(trade.size, 4)}</td>
                    <td>${fmt(trade.filled_price, 5)}</td>
                    <td>${fmt(trade.exit_price, 5)}</td>
                    <td>${fmt(trade.fees_paid, 4)}</td>
                    <td ${color}>${fmt(trade.net_pnl, 4)}</td>
                    <td>${fmt(trade.balance_after_trade, 4)}</td>
                `;
                rows.appendChild(row);
            });
        }

        loadTrades();
        setInterval(loadTrades, 5000);
    </script>
</body>
</html>
