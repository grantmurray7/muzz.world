<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_label }} Trades</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #10151d; color: #f3f4f6; }
        .panel { background: #18202a; border: 1px solid #2b3948; border-radius: 0.75rem; }
        .label { color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
        table { width: 100%; }
        th, td { padding: 0.45rem 0.5rem; border-bottom: 1px solid #253243; text-align: left; }
        th { color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .btn { background: #334155; color: white; border-radius: 0.6rem; padding: 0.7rem 1rem; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .tab-btn { background: #0f172a; color: #cbd5e1; border: 1px solid #334155; border-radius: 0.6rem; padding: 0.55rem 0.9rem; font-weight: 800; text-transform: uppercase; font-size: 0.78rem; }
        .tab-btn.active { background: #334155; color: #fff; }
        .hidden { display: none; }
        .reason-cell { max-width: 420px; white-space: normal; line-height: 1.35; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <div class="max-w-7xl mx-auto space-y-4">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
                <h1 class="text-3xl font-black tracking-tight">{{ page_label }} Trade Log</h1>
                <p class="text-sm text-gray-400 mono">Completed round-trip trades with fees and net PnL</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="{{ dashboard_href }}" class="btn">Dashboard</a>
                <a href="{{ results_href }}" class="btn">Results</a>
            </div>
        </div>

        <div class="flex flex-wrap gap-2">
            <button id="completedTab" class="tab-btn active" type="button">Completed</button>
            <button id="declinedTab" class="tab-btn" type="button">Declined</button>
        </div>

        <div id="completedPanel" class="panel p-4 overflow-x-auto">
            <table class="mono text-sm">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Timestamp</th>
                        <th>Perp</th>
                        <th>Exit Reason</th>
                        <th>Maker/Taker</th>
                        <th>Size</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Fees</th>
                        <th>Net PnL</th>
                        <th>Balance After</th>
                    </tr>
                </thead>
                <tbody id="tradeRows">
                    <tr><td colspan="11" class="text-gray-400">Loading trades...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="declinedPanel" class="panel p-4 overflow-x-auto hidden">
            <table class="mono text-sm">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Perp</th>
                        <th>Reason</th>
                        <th>Failed Checks</th>
                        <th>1m</th>
                        <th>5m</th>
                        <th>15m</th>
                        <th>Spread</th>
                        <th>Imbalance</th>
                    </tr>
                </thead>
                <tbody id="declinedRows">
                    <tr><td colspan="9" class="text-gray-400">Loading declined opportunities...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const apiBase = '{{ api_base }}';
        const ukDateTimeFormatter = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Europe/London',
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        });
        const decimalFormatterCache = new Map();
        function fmt(value, digits = 4) {
            const key = String(digits);
            if (!decimalFormatterCache.has(key)) {
                decimalFormatterCache.set(key, new Intl.NumberFormat('en-GB', {
                    minimumFractionDigits: digits,
                    maximumFractionDigits: digits
                }));
            }
            return decimalFormatterCache.get(key).format(Number(value || 0));
        }

        function formatTradeTime(value) {
            if (value === null || value === undefined || value === '') return 'N/A';
            let parsed = null;
            if (typeof value === 'number') {
                parsed = new Date(value > 1e12 ? value : value * 1000);
            } else if (/^\d+(\.\d+)?$/.test(String(value))) {
                const num = Number(value);
                parsed = new Date(num > 1e12 ? num : num * 1000);
            } else {
                parsed = new Date(value);
            }
            if (Number.isNaN(parsed.getTime())) return String(value);
            return ukDateTimeFormatter.format(parsed).replace(',', '');
        }

        function failedChecksText(checks) {
            const failed = (checks || []).filter((check) => !check.passed).map((check) => check.name);
            return failed.length ? failed.join(', ') : 'N/A';
        }

        function activateTab(name) {
            const completedActive = name === 'completed';
            document.getElementById('completedTab').classList.toggle('active', completedActive);
            document.getElementById('declinedTab').classList.toggle('active', !completedActive);
            document.getElementById('completedPanel').classList.toggle('hidden', !completedActive);
            document.getElementById('declinedPanel').classList.toggle('hidden', completedActive);
        }

        async function loadTrades() {
            const res = await fetch(`${apiBase}/trades`);
            const data = await res.json();
            const rows = document.getElementById('tradeRows');
            rows.innerHTML = '';
            if (!data.trades || data.trades.length === 0) {
                rows.innerHTML = '<tr><td colspan="11" class="text-gray-400">No completed trades yet.</td></tr>';
                return;
            }
            data.trades.forEach((trade) => {
                const row = document.createElement('tr');
                const pnl = Number(trade.net_pnl || 0);
                const color = pnl >= 0 ? 'style="color:#4ade80"' : 'style="color:#f87171"';
                row.innerHTML = `
                    <td>${trade.id || ''}</td>
                    <td>${formatTradeTime(trade.timestamp)}</td>
                    <td>${trade.coin || 'N/A'}</td>
                    <td>${trade.exit_reason || ''}</td>
                    <td>${trade.maker_or_taker || ''}</td>
                    <td>${fmt(trade.size, 4)}</td>
                    <td>${fmt(trade.filled_price, 5)}</td>
                    <td>${fmt(trade.exit_price, 5)}</td>
                    <td>${fmt(trade.fees_paid, 4)}</td>
                    <td ${color}>${fmt(trade.net_pnl, 4)}</td>
                    <td>${fmt(trade.balance_after_trade, 4)}</td>
                `;
                rows.appendChild(row);
            });
        }

        async function loadDeclinedTrades() {
            const res = await fetch(`${apiBase}/declined_trades`);
            const data = await res.json();
            const rows = document.getElementById('declinedRows');
            rows.innerHTML = '';
            if (!data.declined_trades || data.declined_trades.length === 0) {
                rows.innerHTML = '<tr><td colspan="9" class="text-gray-400">No declined opportunities logged yet.</td></tr>';
                return;
            }
            data.declined_trades.forEach((trade) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatTradeTime(trade.timestamp)}</td>
                    <td>${trade.coin || 'N/A'}</td>
                    <td class="reason-cell">${trade.reason_not_taken || 'N/A'}</td>
                    <td class="reason-cell">${failedChecksText(trade.checks)}</td>
                    <td>${fmt(trade.return_1m, 4)}%</td>
                    <td>${fmt(trade.return_5m, 4)}%</td>
                    <td>${fmt(trade.return_15m, 4)}%</td>
                    <td>${fmt(trade.spread_pct, 4)}%</td>
                    <td>${fmt(trade.book_imbalance, 4)}</td>
                `;
                rows.appendChild(row);
            });
        }

        document.getElementById('completedTab').addEventListener('click', () => activateTab('completed'));
        document.getElementById('declinedTab').addEventListener('click', () => activateTab('declined'));
        loadTrades();
        loadDeclinedTrades();
        setInterval(loadTrades, 5000);
        setInterval(loadDeclinedTrades, 5000);
    </script>
</body>
</html>
