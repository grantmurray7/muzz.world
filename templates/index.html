<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Trading Terminal</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; font-weight: 500; margin: 0; }
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-off { background-color: #362222; color: #ff7b72; border: 1px solid #f85149; }
        .status-on { background-color: #162a1c; color: #56d364; border: 1px solid #238636; }
        
        /* Grid Display for Balances and System State */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
        }
        .card-title { color: #8b949e; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
        .card-value { font-size: 26px; font-weight: 500; color: #ffffff; }
        .highlight { color: #58a6ff; }

        /* System Action Buttons */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            border: 1px solid rgba(240,246,252,0.1);
            cursor: pointer;
            transition: opacity 0.1s ease;
        }
        button:active { opacity: 0.8; }
        .btn-start { background-color: #238636; color: #ffffff; }
        .btn-start:hover { background-color: #2ea043; }
        .btn-stop { background-color: #da3633; color: #ffffff; }
        .btn-stop:hover { background-color: #f85149; }

        /* Console Activity Logging Window */
        .console-box {
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #161b22; padding-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Autonomous Engine</h1>
        <span id="bot-status" class="status-badge status-off">SYSTEM DISARMED</span>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">USDT Balance (Wallet)</div>
            <div id="val-usdt" class="card-value">$--.--</div>
        </div>
        <div class="card">
            <div class="card-title">SOL Balance (Wallet)</div>
            <div id="val-sol" class="card-value">--.--</div>
        </div>
        <div class="card">
            <div class="card-title">SOL/USDT Price</div>
            <div id="val-price" class="card-value highlight">$--.--</div>
        </div>
        <div class="card">
            <div class="card-title">Active Entry Basis</div>
            <div id="val-entry" class="card-value">--.--</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" onclick="toggleEngine(true)">START AUTONOMOUS LOOP</button>
        <button class="btn-stop" onclick="toggleEngine(false)">PAUSE CORE ENGINE</button>
    </div>

    <h3 style="font-weight: 400; font-size: 14px; color: #8b949e; text-transform: uppercase;">Real-Time Activity Log</h3>
    <div id="console" class="console-box">
        <div class="log-entry" style="color: #8b949e;">Awaiting system connection stream confirmation...</div>
    </div>
</div>

<script>
    // Asynchronously ping backend API states to instantly update DOM values
    async function updateDashboard() {
        try {
            const response = await fetch('/api/state');
            const data = await response.json();

            if (data.error) return;

            // Engine status updates
            const statusEl = document.getElementById('bot-status');
            if (data.bot_running) {
                statusEl.textContent = 'SYSTEM ACTIVE';
                statusEl.className = 'status-badge status-on';
            } else {
                statusEl.textContent = 'SYSTEM PAUSED';
                statusEl.className = 'status-badge status-off';
            }

            // Balances & Target Updates
            document.getElementById('val-usdt').textContent = `$${parseFloat(data.balance_usdt).toFixed(2)}`;
            document.getElementById('val-sol').textContent = parseFloat(data.balance_sol).toFixed(4);
            document.getElementById('val-price').textContent = `$${parseFloat(data.current_sol_price).toFixed(2)}`;
            
            const entry = parseFloat(data.purchase_price);
            document.getElementById('val-entry').textContent = entry > 0 ? `$${entry.toFixed(2)}` : 'No Open Positions';

            // Logs stream integration
            const consoleBox = document.getElementById('console');
            consoleBox.innerHTML = '';
            if (data.logs && data.logs.length > 0) {
                data.logs.forEach(log => {
                    const line = document.createElement('div');
                    line.className = 'log-entry';
                    line.textContent = log;
                    
                    // Highlight executions visually
                    if (line.textContent.includes('SUCCESS') || line.textContent.includes('COMPLETE')) {
                        line.style.color = '#56d364';
                    } else if (line.textContent.includes('ALERT') || line.textContent.includes('Order')) {
                        line.style.color = '#e3b341';
                    } else if (line.textContent.includes('Error')) {
                        line.style.color = '#ff7b72';
                    }
                    consoleBox.appendChild(line);
                });
            } else {
                consoleBox.innerHTML = '<div class="log-entry" style="color: #8b949e;">No execution telemetry recorded yet. Waiting on tick...</div>';
            }

        } catch (err) {
            console.error('Error fetching terminal loop metrics:', err);
        }
    }

    // Toggle ignition master state flags
    async function toggleEngine(runState) {
        try {
            await fetch('/api/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ run: runState })
            });
            updateDashboard();
        } catch (err) {
            alert('Failed to transmit trigger state action payload.');
        }
    }

    // Loop data retrieval steps frequently (every 3 seconds for smooth logging display)
    setInterval(updateDashboard, 3000);
    // Initial fetch on viewport generation
    updateDashboard();
</script>

</body>
</html>
